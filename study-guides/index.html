<!DOCTYPE html>
<html lang="en">
<head>

<meta property="og:title" content="Study Guides · YuRo @ GitHub">
<meta property="og:description" content="Certification and training study guides in one place: AB-100, Claude Certified Architect, and the GitHub Training Manual — each with a practice test.">

<meta property="og:image:alt" content="YuRo @ GitHub">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Study Guides · YuRo @ GitHub">
<meta name="twitter:description" content="Certification and training study guides in one place: AB-100, Claude Certified Architect, and the GitHub Training Manual — each with a practice test.">
<meta name="twitter:image" content="https://yuro75.github.io/icon-512.png">

<link rel="icon" href="../favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
<title>Study Guides &middot; YuRo @ GitHub</title>
<style>
  :root{
    --navy:#0d1117; --panel:#161b22; --blue:#2f81f7; --blue2:#1f6feb;
    --ink:#e6edf3; --muted:#8b949e; --line:#30363d; --card:#161b22;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;display:flex;flex-direction:column;min-height:100vh;
    font-family:-apple-system,'Segoe UI',system-ui,Arial,sans-serif;
    color:var(--ink);background:var(--navy)}
  header{background:linear-gradient(135deg,#1b2742 0%,#0d1117 70%);border-bottom:1px solid var(--line);
    padding:18px 24px 0}
  .topbar{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .back{color:var(--muted);font-size:14px;text-decoration:none;transition:.15s;white-space:nowrap}
  .back:hover{color:var(--blue)}
  .brand{display:flex;align-items:center;gap:10px;margin-left:auto}
  .brand .badge{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),#8957e5);
    display:flex;align-items:center;justify-content:center;font-size:18px}
  .brand h1{margin:0;font-size:18px;font-weight:800;letter-spacing:-.3px}
  .tabs{max-width:1100px;margin:14px auto 0;display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
  .tab{appearance:none;border:1px solid var(--line);border-bottom:none;background:var(--card);color:var(--muted);
    font:inherit;font-size:14px;font-weight:600;padding:11px 18px;border-radius:10px 10px 0 0;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:.15s;position:relative;top:1px}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--ink);background:var(--navy);border-color:var(--line)}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--blue)}
  .tab .ico{font-size:16px}
  .open{margin-left:auto;font-size:13px;color:var(--muted);text-decoration:none;
    border:1px solid var(--line);padding:7px 13px;border-radius:20px;transition:.15s;margin-bottom:6px}
  .open:hover{color:#fff;border-color:var(--blue);background:rgba(47,129,247,.12)}
  .stage{flex:1;display:flex;min-height:0}
  .frame{flex:1;width:100%;border:0;background:#fff}
  footer{text-align:center;color:var(--muted);font-size:13px;padding:12px;border-top:1px solid var(--line);background:var(--navy)}
  footer a{color:var(--blue);text-decoration:none}
  @media(max-width:680px){.tab{padding:10px 12px;font-size:13px}.brand h1{font-size:16px}.open{display:none}}
</style>
</head>
<body>
  <header>
    <div class="topbar">
      <a class="back" href="../">&#8592; YuRo @ GitHub</a>
      <div class="brand">
        <div class="badge">&#127891;</div>
        <h1>Study Guides</h1>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-src="https://yuro75.github.io/study-guides/ab-100/" role="tab">
        <span class="ico">&#129302;</span> AB-100
      </button>
      <button class="tab" data-src="https://yuro75.github.io/claude-architect-foundations/" role="tab">
        <span class="ico">&#127891;</span> Claude Certified Architect
      </button>
      <button class="tab" data-src="https://yuro75.github.io/github-training-manual/" role="tab">
        <span class="ico">&#128218;</span> GitHub Training Manual
      </button>
      <a class="open" id="openTab" href="https://yuro75.github.io/study-guides/ab-100/" target="_blank" rel="noopener">Open in new tab &#8599;</a>
    </nav>
  </header>

  <div class="stage">
    <iframe class="frame" id="frame" title="Study guide" loading="lazy"
      src="https://yuro75.github.io/study-guides/ab-100/"></iframe>
  </div>

  <footer>
    Hosted on GitHub Pages &middot; <a href="https://github.com/YuRo75/yuro75.github.io">source</a> &middot; Updated June 2026
  </footer>

<script>
  const tabs = document.querySelectorAll('.tab');
  const frame = document.getElementById('frame');
  const openTab = document.getElementById('openTab');
  const hashes = ['ab-100','claude','github'];
  function activate(i){
    tabs.forEach(t => t.classList.remove('active'));
    tabs[i].classList.add('active');
    const src = tabs[i].dataset.src;
    frame.src = src;
    openTab.href = src;
    history.replaceState(null,'','#'+hashes[i]);
  }
  tabs.forEach((t,i) => t.addEventListener('click', () => activate(i)));
  const h = location.hash.replace('#','').toLowerCase();
  const idx = hashes.indexOf(h);
  if(idx > 0){ activate(idx); }
</script>
</body>
</html>
